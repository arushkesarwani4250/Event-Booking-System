version: '3.8'

services:
  # The Database Container
  db:
    image: mysql:8.0
    container_name: booking_mysql
    restart: always
    environment:
      # Inject the root password from the host's .env file, fallback to root
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password123}
      MYSQL_DATABASE: event_booking_db
    ports:
      # We map container port 3306 to host port 3307 so it doesn't crash 
      # into your local MySQL running on 3306!
      - "3307:3306"
    volumes:
      # THE MAGIC TRICK: This automatically runs your schema.sql when the container builds!
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Persist data even if the container stops
      - mysql_booking_data:/var/lib/mysql

  # The Node.js Server Container
  api:
    build: .
    container_name: booking_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Notice how DB_HOST is 'db' (the name of the service above), not localhost!
      # Docker handles this internal DNS automatically between containers.
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: event_booking_db
      DB_PORT: 3306
    depends_on:
      # Wait for the database container to build first
      - db

volumes:
  mysql_booking_data:
